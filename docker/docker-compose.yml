version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schoolos
      POSTGRES_PASSWORD: schoolos_secret
      POSTGRES_DB: schoolos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolos -d schoolos"]
      interval: 5s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core-api
    environment:
      DATABASE_URL: postgresql://schoolos:schoolos_secret@postgres:5432/schoolos
      JWT_SECRET: change-me-in-production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  admin-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    ports:
      - "3000:80"
    depends_on:
      - core-api

  student-portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.student
    ports:
      - "3001:80"
    depends_on:
      - core-api

  parent-portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.parent
    ports:
      - "3002:80"
    depends_on:
      - core-api

  ai-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-engine
    environment:
      LM_STUDIO_URL: http://host.docker.internal:1234/v1
      PORT: 5000
    ports:
      - "5000:5000"

volumes:
  postgres_data:
